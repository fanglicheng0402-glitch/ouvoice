services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ouvoice
      POSTGRES_USER: ouvoice
      POSTGRES_PASSWORD: ouvoice
    ports:
      - "5432:5432"
    volumes:
      - ouvoice-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ouvoice"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ouvoice-postgres:
